<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>pablorozados.github.io</title>
  <style>
    body {
      background-color: black;
      color: #00FF00;
      font-family: 'Courier New', monospace;
      padding: 10px;
      overflow-x: hidden;
    }
    #terminal {
      white-space: pre-wrap;
      min-height: 80vh;
      overflow-y: auto;
    }
    #input-line {
      display: inline;
    }
    #blinker {
      animation: blink 1s step-end infinite;
    }
    @keyframes blink {
      50% { opacity: 0; }
    }
    audio { display: none; }
  </style>
</head>
<body>
  <audio id="typeSound" src="https://www.soundjay.com/button/sounds/button-16.mp3"></audio>
  <div id="terminal"></div>
  <div id="input-line"><span id="prompt">C:\></span><span id="input"></span><span id="blinker">█</span></div>

  <script>
    const terminal = document.getElementById('terminal');
    const inputLine = document.getElementById('input');
    const promptSpan = document.getElementById('prompt');
    const typeSound = document.getElementById('typeSound');

    let currentDir = 'C:\\';
    let subDir = '';
    let input = '';

    const repos = {
      arte: {
        url: 'https://pablorozados.github.io/arte/',
        description: 'projeto pessoal que transforma texto em arte abstrata',
        files: ['command.sys', 'install.bak', 'arte.exe', 'regfull.ews', 'macross.dll']
      },
      aditahistoriadovideogame: {
        url: 'https://pablorozados.github.io/aditahistoriadovideogame/',
        description: 'site onde hospedo a linha do tempo do meu podcast sobre a historia do videogame',
        files: ['boot.bin', 'video.cfg', 'aditahistoriadovideogame.exe', 'pod.sys', 'load.drv']
      },
      kms: {
        url: 'https://pablorozados.github.io/kms/',
        description: 'calculadora que converte a quilometragem do seu carro em voltas na terra',
        files: ['carros.bat', 'earth.map', 'kms.exe', 'stats.dat', 'config.ini']
      },
      reliquiasdoxis: {
        url: 'https://pablorozados.github.io/reliquiasdoxis/',
        description: 'meu site pessoal de resenhas de xis',
        files: ['xisdata.sys', 'cheddar.rom', 'reliquiasdoxis.exe', 'taste.bak', 'review.dll']
      },
      autor: {
        description: 'sobre mim',
        files: ['sobre_mim.txt']
      }
    };

    const print = (text) => {
      terminal.innerHTML += text + '\n';
      terminal.scrollTop = terminal.scrollHeight;
    };

    const blankLine = () => {
      terminal.innerHTML += '\n';
      terminal.scrollTop = terminal.scrollHeight;
    };

    const playSound = () => {
      typeSound.currentTime = 0;
      typeSound.play();
    };

    const toKey = (name) => name.toLowerCase();

    const showPrompt = () => {
      promptSpan.innerText = currentDir + (subDir ? subDir + '\\>' : '>');
      terminal.scrollTop = terminal.scrollHeight;
    };

    const listFiles = () => {
      if (!subDir) {
        print('.');
        print('..');
        Object.keys(repos).forEach(repo => {
          print(repo);
        });
      } else {
        const repoKey = toKey(subDir);
        if (repos[repoKey]) {
          repos[repoKey].files.forEach(f => print(f));
        } else {
          print('diretorio nao encontrado.');
        }
      }
    };

    const showInfo = (arg) => {
      const repoKey = toKey(arg);
      if (repos[repoKey]) {
        print(repos[repoKey].description);
      } else {
        print('projeto nao encontrado.');
      }
    };

    const runFile = (arg) => {
      const file = arg.toLowerCase();
      const repoMatch = Object.entries(repos).find(([key, val]) => file === key + '.exe' || (val.files && val.files.find(f => f.toLowerCase() === file)));
      if (repoMatch) {
        window.location.href = repoMatch[1].url;
      } else if (subDir.toLowerCase() === 'autor' && file === 'sobre_mim.txt') {
        print('ola! sou jornalista, metido a dev "no code", cozinheiro, gamer raiz e comilao de carteirinha.\naqui estao meus projetos pessoais que brinco no tempo livre.\nobrigado pela visita.');
      } else {
        print('arquivo nao pode ser executado.');
      }
    };

    const handleCommand = (cmd) => {
      const trimmedCmd = cmd.trim();
      const [base, ...args] = trimmedCmd.split(/\s+/);
      const command = base.toLowerCase();
      const arg = args.join(' ');

      if (command === 'help') {
        print('comandos disponiveis:\ndir\ncd [diretorio]\ncd..\ninfo [nome]\nrun [arquivo]\nhelp');
      } else if (command === 'dir') {
        listFiles();
      } else if (command === 'cd') {
        if (arg === '..') {
          subDir = '';
        } else if (repos[toKey(arg)]) {
          subDir = Object.keys(repos).find(r => r.toLowerCase() === arg.toLowerCase()) || arg;
        } else {
          print('diretorio nao encontrado.');
        }
      } else if (command === 'cd..') {
        subDir = '';
      } else if (command === 'info') {
        showInfo(arg);
      } else if (command === 'run') {
        runFile(arg);
      } else if (trimmedCmd.toLowerCase().endsWith('.exe')) {
        runFile(trimmedCmd);
      } else {
        print('comando nao reconhecido. digite "help" para ajuda.');
      }
      blankLine();
      showPrompt();
    };

    const bootSequence = async () => {
      const ramCount = async (label, endValue) => {
        for (let i = 0; i <= endValue; i += 64) {
          terminal.innerHTML += `${label} ${i}K` + '\r';
          terminal.scrollTop = terminal.scrollHeight;
          await new Promise(r => setTimeout(r, 20));
          terminal.innerHTML = terminal.innerHTML.replace(/.*\r/, '');
        }
        print(`${label} ${endValue}K Passed`);
      };

      print('phoenix bios version 4.0 release 6.0');
      await new Promise(resolve => setTimeout(resolve, 300));
      print('copyright 1985-1993 phoenix technologies ltd.');
      await new Promise(resolve => setTimeout(resolve, 300));
      print('cpu = intel pentium iii 500mhz');
      await new Promise(resolve => setTimeout(resolve, 300));
      await ramCount('640k system ram', 640);
      await ramCount('3072k extended ram', 3072);
      print('mouse initialized');
      await new Promise(resolve => setTimeout(resolve, 300));
      print('hard drive: c:\\ initialized');
      await new Promise(resolve => setTimeout(resolve, 300));
      print('bios shadowed');
      await new Promise(resolve => setTimeout(resolve, 300));
      print('starting ms-dos...');
      blankLine();
      showPrompt();
    };

    window.addEventListener('keydown', (e) => {
      if (e.key.length === 1) {
        input += e.key;
        inputLine.innerText = input;
        playSound();
      } else if (e.key === 'Backspace') {
        input = input.slice(0, -1);
        inputLine.innerText = input;
      } else if (e.key === 'Enter') {
        terminal.innerHTML += promptSpan.innerText + input + '\n';
        handleCommand(input);
        input = '';
        inputLine.innerText = '';
      }
      terminal.scrollTop = terminal.scrollHeight;
    });

    bootSequence();
  </script>
</body>
</html>
